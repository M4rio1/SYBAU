<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeAI Terminal</title>
    <style>
        body {
            background: #0f0f0f; 
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #glass-container {
            width: 80%;
            height: 85%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
        }
        select {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 10px;
            outline: none;
            font-family: inherit;
            cursor: pointer;
        }
        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 10px;
            line-height: 1.5;
            white-space: pre-wrap; 
        }
        /* The custom frosted glass box */
        .thinking-box {
            background: rgba(0, 0, 0, 0.4);
            border-left: 3px solid #555;
            color: #aaa;
            padding: 12px;
            margin: 10px 0;
            border-radius: 0 10px 10px 0;
            font-size: 0.9em;
            font-style: italic;
        }
        input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            color: white;
            border-radius: 10px;
            outline: none;
            margin-top: 15px;
            font-size: 1em;
        }
        input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        /* Custom animation for the status text */
        .status-text {
            color: #888;
            font-style: italic;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="glass-container">
        <div id="top-bar">
            <h3 style="margin: 0; font-weight: 400; letter-spacing: 1px;">VibeAI <span style="font-size: 0.5em; color: #888;">OFFLINE</span></h3>
            <select id="model-select">
                <option value="deepseek-r1:8b">DeepSeek-R1 (8B)</option>
                <option value="gemma4:e4b">Gemma 4 (e4b)</option>
            </select>
        </div>

        <div id="chat-box"></div>
        <input type="text" id="user-input" placeholder="Initiate sequence...">
    </div>

    <script>
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const modelSelect = document.getElementById('model-select');

        let isGenerating = false; 

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== '' && !isGenerating) {
                isGenerating = true;
                const text = input.value;
                input.value = '';
                const activeModel = modelSelect.value;
                
                chatBox.innerHTML += `<div class="message"><b>You:</b>\n${text}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                
                let aiResponse = document.createElement('div');
                aiResponse.className = "message";
                aiResponse.innerHTML = `<b style="color: #4CAF50;">${activeModel.split(':')[0]}:</b>\n<span class="status-text">Connecting to engine...</span>`;
                chatBox.appendChild(aiResponse);

                try {
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            model: activeModel,
                            messages: [{role: 'user', content: text}]
                        })
                    });

                    if (!response.ok) throw new Error("Backend connection failed.");

                    aiResponse.innerHTML = `<b style="color: #4CAF50;">${activeModel.split(':')[0]}:</b>\n<span class="status-text">Connected. Booting logic...</span>`;

                    const reader = response.body.getReader();
                    let fullText = "";

                    while (true) {
                        const {done, value} = await reader.read();
                        if (done) break;
                        let rawPacket = new TextDecoder().decode(value);
console.log("INCOMING RAW PACKET: ", rawPacket);  // <-- THE WIRETAP
fullText += rawPacket;
                        
                        // 1. THE ARMOR: Strip all HTML brackets so DeepSeek can't crash the browser
                        let safeText = fullText.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        
                        // 2. THE PAINT: Inject our custom frosted glass box cleanly
                        safeText = safeText.replace(/&lt;think&gt;/gi, '<div class="thinking-box">💭 <b>Internal Logic:</b><br>');
                        safeText = safeText.replace(/&lt;\/think&gt;/gi, '</div>');
                        
                        aiResponse.innerHTML = `<b style="color: #4CAF50;">${activeModel.split(':')[0]}:</b>\n\n` + safeText;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                } catch (error) {
                    aiResponse.innerHTML = `<b style="color: #f44336;">System Error:</b> connection dropped. Check the VS Code terminal.`;
                }
                
                isGenerating = false; 
            }
        });
    </script>
